<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دعوة نور وماجدة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0a0706;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- الخلفية الثابتة (الصورة) ---- */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: url('cover.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }
        #bg-layer.show {
            opacity: 1;
        }
        #bg-layer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
        }

        /* ---- نص Welcome ---- */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .welcome-overlay.show {
            opacity: 1;
        }
        .welcome-overlay h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 10vw, 5rem);
            color: #f6e7b0;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.6), 0 0 80px rgba(0, 0, 0, 0.8);
            letter-spacing: 6px;
            animation: goldPulse 2s infinite ease-in-out;
            text-align: center;
            padding: 20px;
        }
        @keyframes goldPulse {
            0%, 100% { text-shadow: 0 0 40px rgba(212,175,55,0.3), 0 0 80px rgba(0,0,0,0.5); }
            50% { text-shadow: 0 0 60px rgba(212,175,55,0.8), 0 0 120px rgba(212,175,55,0.4); }
        }

        /* ---- الغلاف (الخلفية السودا والزر) ---- */
        .cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0a0706;
            transition: all 1.8s cubic-bezier(0.77, 0, 0.18, 1);
            transform-origin: top center;
            transform: scaleY(1);
        }
        .cover.hidden {
            transform: scaleY(0);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .cover-content {
            position: relative;
            z-index: 15;
            text-align: center;
            color: #fff;
            padding: 20px;
        }

        .btn-open {
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 6px;
            cursor: pointer;
            border-radius: 60px;
            background: rgba(212, 175, 55, 0.08);
            backdrop-filter: blur(8px);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
            user-select: none;
        }
        .btn-open::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(212,175,55,0.2), transparent, rgba(212,175,55,0.2), transparent);
            animation: rotateGlow 4s linear infinite;
        }
        @keyframes rotateGlow {
            100% { transform: rotate(360deg); }
        }
        .btn-open span {
            position: relative;
            z-index: 2;
        }
        .btn-open:active {
            transform: scale(0.95);
        }

        /* ---- قلوب ونجوم من السما ---- */
        .falling-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25;
            overflow: hidden;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .falling-particles.show {
            opacity: 1;
        }
        .fall-item {
            position: absolute;
            top: -20px;
            animation: fallDown linear forwards;
            font-size: 1rem;
            opacity: 0.7;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            will-change: transform;
        }
        @keyframes fallDown {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.2); opacity: 0; }
        }

        /* ---- المحتوى الداخلي ---- */
        .inner-content {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(160deg, rgba(15, 10, 8, 0.85) 0%, rgba(36, 27, 23, 0.92) 100%);
            padding: 40px 20px 100px;
            margin-top: 100vh;
            transition: margin-top 1.8s cubic-bezier(0.22, 1, 0.36, 1);
            color: #f5e6d3;
            text-align: center;
            backdrop-filter: blur(2px);
        }
        .inner-content.visible {
            margin-top: 0;
        }

        .inner-content h2 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 10vw, 5rem);
            color: #f6e7b0;
            margin-bottom: 5px;
            text-shadow: 0 0 50px rgba(212,175,55,0.4), 0 0 100px rgba(0,0,0,0.5);
            letter-spacing: 4px;
        }
        .inner-content .sub-date {
            font-size: 1.2rem;
            letter-spacing: 6px;
            color: #a08050;
            font-weight: 300;
        }
        .inner-content .message {
            font-size: 1.1rem;
            max-width: 600px;
            margin: 25px auto;
            line-height: 2.2;
            font-weight: 300;
            color: #d4c5b0;
            font-style: italic;
            padding: 0 10px;
        }
        .divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 30px auto;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .countdown-item {
            background: rgba(212, 175, 55, 0.06);
            border: 1px solid rgba(212, 175, 55, 0.15);
            padding: 12px 20px;
            border-radius: 16px;
            min-width: 70px;
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }
        .countdown-item span {
            display: block;
            font-size: 2.5rem;
            font-weight: 600;
            color: #f6e7b0;
            text-shadow: 0 0 20px rgba(212,175,55,0.2);
        }
        .countdown-item label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #a6927a;
        }

        .btn-location {
            display: inline-block;
            background: #d4af37;
            color: #1a1412;
            padding: 14px 40px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 2px;
            transition: 0.3s;
            margin: 20px 0;
            border: none;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(212,175,55,0.2);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
        }
        .btn-location:active {
            transform: scale(0.95);
        }

        .designer-signature {
            text-align: right;
            margin-top: 50px;
            padding: 10px 20px 0 0;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }
        .designer-signature p {
            font-size: 0.65rem;
            color: #6a5a40;
            letter-spacing: 1.5px;
            font-weight: 300;
            font-family: 'Times New Roman', serif;
        }
        .designer-signature p strong {
            color: #a08050;
            font-weight: 400;
        }

        .music-player {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #d4af37;
            border-radius: 50px;
            padding: 6px 16px;
            color: #d4af37;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
        }
        .music-player.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .music-player:active {
            transform: scale(0.9);
        }

        #petals-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
            opacity: 0;
            transition: opacity 2s ease;
        }
        #petals-container.show {
            opacity: 1;
        }
        .petal {
            position: absolute;
            top: -10%;
            color: #d4af37;
            font-size: 1.3rem;
            opacity: 0.2;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.4; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.1); opacity: 0; }
        }

        @media (max-width: 600px) {
            .countdown-item { min-width: 55px; padding: 8px 12px; }
            .countdown-item span { font-size: 1.8rem; }
            .btn-open { padding: 14px 28px; font-size: 1rem; letter-spacing: 4px; }
            .inner-content h2 { font-size: 2.8rem; }
            .welcome-overlay h1 { font-size: 2.5rem; }
            .designer-signature p { font-size: 0.55rem; }
        }
        @media (max-width: 400px) {
            .countdown { gap: 6px; }
            .countdown-item { min-width: 45px; padding: 6px 8px; }
            .countdown-item span { font-size: 1.3rem; }
            .btn-open { padding: 12px 20px; font-size: 0.8rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="welcome-overlay" id="welcomeOverlay">
        <h1>♡︎ welcome ♡︎</h1>
    </div>

    <div class="falling-particles" id="fallingParticles"></div>

    <div id="petals-container"></div>

    <div class="music-player" id="musicToggle">🎵 تشغيل</div>
    <audio id="bgMusic" preload="auto">
        <source src="song.mp3" type="audio/mpeg">
        <source src="song.mp3.mpeg" type="audio/mpeg">
        <source src="song.aac" type="audio/aac">
        <source src="song.m4a" type="audio/mp4">
    </audio>

    <div class="cover" id="cover">
        <div class="cover-content">
            <button class="btn-open" id="openBtn"><span>Open Invitation</span></button>
        </div>
    </div>

    <div class="inner-content" id="innerContent">
        <h2>Nour & Magda</h2>
        <p class="sub-date">٠٥ · ٠٨ · ٢٠٢٦</p>
        <div class="divider"></div>
        <div class="message">
            "Join us as we begin our forever.<br>
            Your presence means the world to us."
        </div>

        <div class="countdown" id="countdown">
            <div class="countdown-item"><span id="days">00</span><label>يوم</label></div>
            <div class="countdown-item"><span id="hours">00</span><label>ساعة</label></div>
            <div class="countdown-item"><span id="minutes">00</span><label>دقيقة</label></div>
            <div class="countdown-item"><span id="seconds">00</span><label>ثانية</label></div>
        </div>

        <div class="divider"></div>
        <p style="font-weight:300; font-size:1.1rem;">⏰ الساعة 9:00 مساءً</p>
        <p style="font-weight:300; margin-bottom:20px; color:#b89a6a;">📍 قصر أبو عوف - ديرب نجم</p>

        <a href="https://maps.google.com/maps?q=ديرب+نجم+قصر+أبو+عوف" target="_blank" class="btn-location">
            📍 افتح الموقع على الخريطة
        </a>

        <div class="divider"></div>

        <div class="designer-signature">
            <p>✧ <strong>𝒜𝓂𝓁.𝒜.𝒵𝒾𝓃𝒶</strong> ✧</p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---- العناصر ----
            const bgLayer = document.getElementById('bg-layer');
            const welcomeOverlay = document.getElementById('welcomeOverlay');
            const fallingParticles = document.getElementById('fallingParticles');
            const petalsContainer = document.getElementById('petals-container');
            const musicToggle = document.getElementById('musicToggle');
            const bgMusic = document.getElementById('bgMusic');
            const cover = document.getElementById('cover');
            const openBtn = document.getElementById('openBtn');
            const innerContent = document.getElementById('innerContent');

            let isPlaying = false;
            let isOpened = false;
            let fallingInterval = null;

            // ---- بتلات ذهبية ----
            function createPetals() {
                const container = document.getElementById('petals-container');
                const emojis = ['✦', '✧', '❋', '✶', '♡'];
                for (let i = 0; i < 25; i++) {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    petal.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    petal.style.left = Math.random() * 100 + '%';
                    petal.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
                    petal.style.animationDuration = (Math.random() * 14 + 10) + 's';
                    petal.style.animationDelay = (Math.random() * 15) + 's';
                    container.appendChild(petal);
                }
            }
            createPetals();

            // ---- العد التنازلي ----
            function updateCountdown() {
                const target = new Date('2026-08-05T21:00:00').getTime();
                const diff = target - Date.now();
                if (diff <= 0) {
                    document.getElementById('days').textContent = '00';
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    return;
                }
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('days').textContent = String(d).padStart(2, '0');
                document.getElementById('hours').textContent = String(h).padStart(2, '0');
                document.getElementById('minutes').textContent = String(m).padStart(2, '0');
                document.getElementById('seconds').textContent = String(s).padStart(2, '0');
            }
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // ---- تشغيل القلوب والنجوم من السما ----
            function startFallingParticles() {
                const container = fallingParticles;
                const emojis = ['❤️', '💛', '✨', '⭐', '♥️', '✧'];
                if (fallingInterval) clearInterval(fallingInterval);
                container.innerHTML = '';
                fallingInterval = setInterval(function() {
                    const el = document.createElement('div');
                    el.className = 'fall-item';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + '%';
                    el.style.fontSize = (Math.random() * 0.7 + 0.5) + 'rem';
                    el.style.animationDuration = (Math.random() * 4 + 3) + 's';
                    el.style.animationDelay = (Math.random() * 0.3) + 's';
                    el.style.color = ['#d4af37', '#ffd700', '#ff6b81', '#fff', '#f6e7b0'][Math.floor(Math.random() * 5)];
                    container.appendChild(el);
                    setTimeout(function() {
                        if (el.parentNode) el.remove();
                    }, 7000);
                }, 250);
            }

            // ---- وظيفة فتح الدعوة (بتشتغل بالضغط) ----
            function openInvitation(e) {
                // منع أي سلوك افتراضي للزر
                if (e) e.preventDefault();

                // منع تكرار الضغط
                if (isOpened) return;
                isOpened = true;

                // 1. إخفاء الزر فوراً
                openBtn.style.opacity = '0';
                openBtn.style.pointerEvents = 'none';

                // 2. تشغيل الموسيقى
                bgMusic.play().then(function() {
                    console.log('🎵 الموسيقى شغالة');
                }).catch(function(err) {
                    console.log('⚠️ خطأ في تشغيل الموسيقى:', err);
                });

                // 3. إظهار الصورة والنصوص والبتلات والقلوب
                bgLayer.classList.add('show');
                welcomeOverlay.classList.add('show');
                petalsContainer.classList.add('show');
                fallingParticles.classList.add('show');
                startFallingParticles();

                // 4. طي الخلفية السوداء بعد 0.3 ثانية
                setTimeout(function() {
                    cover.classList.add('hidden');
                }, 300);

                // 5. ظهور المحتوى الداخلي بعد 1.5 ثانية
                setTimeout(function() {
                    innerContent.classList.add('visible');
                    // السماح بالتمرير بعد ظهور المحتوى
                    document.body.style.overflow = 'auto';
                    // إخفاء الـ welcome بعد ثانية
                    setTimeout(function() {
                        welcomeOverlay.classList.remove('show');
                    }, 1200);
                }, 1500);

                // 6. إظهار زر التحكم في الموسيقى
                musicToggle.classList.add('visible');
            }

            // ---- ربط حدث الضغط بالزر (طريقة واحدة فقط عشان مانتعارضش) ----
            openBtn.addEventListener('click', openInvitation);

            // ---- تحكم زر الموسيقى ----
            musicToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                if (isPlaying) {
                    bgMusic.pause();
                    musicToggle.innerHTML = '🎵 تشغيل';
                } else {
                    bgMusic.play().catch(function() {});
                    musicToggle.innerHTML = '⏸️ إيقاف';
                }
                isPlaying = !isPlaying;
            });

            // ---- إعادة تشغيل الموسيقى إذا رجع المستخدم للصفحة ----
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden && isOpened && isPlaying) {
                    bgMusic.play().catch(function() {});
                }
            });

            // ---- منع التمرير في البداية ----
            document.body.style.overflow = 'hidden';

            // ---- تهيئة المحتوى تحت الشاشة ----
            innerContent.style.marginTop = '100vh';

            console.log('✅ الدعوة جاهزة! اضغط على Open Invitation');
        })();
    </script>
</body>
</html>
